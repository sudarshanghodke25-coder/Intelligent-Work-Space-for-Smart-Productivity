<style>
    .glass-panel {
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05);
    }
    
    .action-gradient {
      background: linear-gradient(135deg, #a078ff 0%, #4cd7f6 100%);
      transition: all 0.3s ease;
    }
    
    .action-gradient:hover {
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
      transform: translateY(-1px);
    }

    .sidebar-glow-active {
      box-shadow: 0 0 15px rgba(76, 215, 246, 0.2);
    }

    .floating-blobs {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
      background: #0b1326;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: float 20s infinite alternate;
    }

    @keyframes float {
      from { transform: translate(0, 0); }
      to { transform: translate(100px, 100px); }
    }

    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #d0bcff;
    }
  </style>

<body class="bg-background text-on-surface font-body-md selection:bg-primary/30 min-h-screen">

<div class="floating-blobs">
<div class="blob bg-primary w-[500px] h-[500px] -top-20 -left-20"></div>
<div class="blob bg-secondary w-[400px] h-[400px] bottom-0 right-0" style="animation-delay: -5s;"></div>
<div class="blob bg-tertiary w-[300px] h-[300px] top-1/2 left-1/3" style="animation-delay: -10s;"></div>
</div>
<div class="flex h-screen overflow-hidden">
